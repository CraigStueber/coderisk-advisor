# CodeRisk Advisor — GitHub Actions Deployment
# Triggers on push to main branch (backend/ changes only)
# Builds Docker image, pushes to GCR, deploys to Cloud Run

name: Deploy Backend to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build and push Docker image
        working-directory: backend
        run: |
          IMAGE="gcr.io/${{ secrets.GCP_PROJECT_ID }}/coderisk-advisor:${{ github.sha }}"
          LATEST="gcr.io/${{ secrets.GCP_PROJECT_ID }}/coderisk-advisor:latest"
          docker build -t $IMAGE -t $LATEST .
          docker push $IMAGE
          docker push $LATEST

      - name: Deploy to Cloud Run
        working-directory: backend
        run: |
          sed "s/YOUR_PROJECT_ID/${{ secrets.GCP_PROJECT_ID }}/g" cloudrun.yaml > cloudrun.resolved.yaml
          gcloud run services replace cloudrun.resolved.yaml \
            --region ${{ secrets.GCP_REGION }}
          rm cloudrun.resolved.yaml

      - name: Verify deployment
        run: |
          SERVICE_URL=$(gcloud run services describe coderisk-advisor \
            --region ${{ secrets.GCP_REGION }} \
            --format="value(status.url)")
          echo "Deployed to: $SERVICE_URL"
          curl -f "$SERVICE_URL/api/health" || exit 1
